name: Backend CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 IMPORTANTE: garantir Java correto
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 🔍 DEBUG (ESSENCIAL)
      - name: Check Java Version
        run: |
          java -version
          mvn -version

      - name: Cache Maven (optional now)
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ github.run_id }}
          restore-keys: maven-
      - name: Build + Test
        run: mvn clean verify